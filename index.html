// FETCH WITH TIMEOUT

function fetchWithTimeout(url,opts,timeoutMs=60000){
  return Promise.race([
    fetch(url,opts),
    new Promise((_,rej)=>setTimeout(()=>rej(new Error("Timeout efter "+(timeoutMs/1000)+"s")),timeoutMs))
  ]);
}

const TTS_MODELS=["gemini-2.5-flash-preview-tts","gemini-2.5-pro-preview-tts"];

function pcmToWav(b64){
  const raw=atob(b64);const buf=new ArrayBuffer(raw.length);const v=new Uint8Array(buf);
  for(let i=0;i<raw.length;i++)v[i]=raw.charCodeAt(i);
  const sr=24000,nc=1,bps=16,len=buf.byteLength;
  const wavBuf=new ArrayBuffer(44+len);const w=new DataView(wavBuf);
  const ws=(o,s)=>{for(let i=0;i<s.length;i++)w.setUint8(o+i,s.charCodeAt(i))};
  ws(0,"RIFF");w.setUint32(4,36+len,true);ws(8,"WAVE");ws(12,"fmt ");
  w.setUint32(16,16,true);w.setUint16(20,1,true);w.setUint16(22,nc,true);
  w.setUint32(24,sr,true);w.setUint32(28,sr*nc*(bps/8),true);
  w.setUint16(32,nc*(bps/8),true);w.setUint16(34,bps,true);
  ws(36,"data");w.setUint32(40,len,true);
  new Uint8Array(wavBuf,44).set(new Uint8Array(buf));
  return URL.createObjectURL(new Blob([wavBuf],{type:"audio/wav"}));
}

async function geminiTTS(text,apiKey,style){
  if(!apiKey)return null;
  const body={contents:[{role:"user",parts:[{text:(style?style+": ":"")+`"${text}"`}]}],generationConfig:{responseModalities:["AUDIO"],speechConfig:{voiceConfig:{prebuiltVoiceConfig:{voiceName:"Kore"}}}}};

  for(const model of TTS_MODELS){
    try{
      const url=`https://generativelanguage.googleapis.com/v1beta/models/${model}:generateContent?key=${apiKey}`;
      const r=await fetchWithTimeout(url,{method:"POST",headers:{"Content-Type":"application/json"},body:JSON.stringify(body)},10000);
      const d=await r.json();
      if(d.error)continue;
      const b64=d?.candidates?.[0]?.content?.parts?.[0]?.inlineData?.data;
      if(!b64)continue;
      return pcmToWav(b64);
    }catch{continue}
  }
  return null;
}

function browserTTS(text){
  const s=window.speechSynthesis;if(!s)return;s.cancel();
  const u=new SpeechSynthesisUtterance(text);
  const dk=s.getVoices().find(v=>v.lang&&v.lang.startsWith("da"));
  if(dk)u.voice=dk;u.lang="da-DK";u.rate=0.88;s.speak(u);
}

// GEMINI TEXT ANALYSIS

const GEMINI_MODELS=["gemini-2.0-flash","gemini-2.0-flash-lite","gemini-3-flash","gemini-2.5-flash-lite"];

async function geminiAnalyze(content,apiKey,isImage=false,mimeType="image/jpeg",onStatus){
  if(!apiKey)return{error:"Ingen API-nøgle. Gå til Indstillinger."};
  const prompt=`You are analyzing Danish learning material. Extract:
1. "vocab": array of {"da":"Danish word/phrase","en":"English translation","cat":"category"}
2. "grammar": array of short grammar point strings found
3. "scenario": {"title":"short Danish title","titleEn":"English title","setup":"Danish scenario description using extracted vocab","setupEn":"English translation","role":"AI character role in English","vocab":["da_word|en_word",...]}

Return ONLY valid JSON, no markdown, no backticks. Max 15 vocab items. Make the scenario practical and conversational.`;

  let parts;
  if(isImage){
    parts=[{text:prompt},{inlineData:{mimeType:mimeType,data:content}}];
  }else{
    parts=[{text:prompt+"\n\nMATERIAL:\n"+content}];
  }

  const errors=[];
  for(let i=0;i<GEMINI_MODELS.length;i++){
    const model=GEMINI_MODELS[i];
    if(onStatus)onStatus("Prøver "+model+" ("+(i+1)+"/"+GEMINI_MODELS.length+")...");
    const url=`https://generativelanguage.googleapis.com/v1beta/models/${model}:generateContent?key=${apiKey}`;
    try{
      const r=await fetchWithTimeout(url,{method:"POST",headers:{"Content-Type":"application/json"},body:JSON.stringify({contents:[{role:"user",parts}],generationConfig:{temperature:0.2}})});
      const d=await r.json();
      if(d.error){
        const msg=d.error.message||JSON.stringify(d.error);
        errors.push(model+": "+msg.slice(0,100));
        continue;
      }
      let txt=d?.candidates?.[0]?.content?.parts?.[0]?.text||"";
      if(!txt){errors.push(model+": tomt svar");continue}
      txt=txt.replace(/```json|```/g,"").trim();
      try{return JSON.parse(txt)}catch(pe){errors.push(model+": JSON parse fejl");continue}
    }catch(e){
      errors.push(model+": "+e.message);
      continue;
    }
  }
  return{error:"Alle modeller fejlede:\n"+errors.join("\n"),retryable:errors.every(e=>e.includes("quota")||e.includes("rate")||e.includes("exceeded")||e.includes("429")||e.includes("RESOURCE_EXHAUSTED"))};
}

async function readFileAsBase64(file){
  return new Promise((resolve,reject)=>{
    const reader=new FileReader();
    reader.onload=()=>resolve(reader.result.split(",")[1]);
    reader.onerror=()=>reject(new Error("Kunne ikke læse filen"));
    reader.readAsDataURL(file);
  });
}

const isDue=(c)=>!c.nextReview||Date.now()>=c.nextReview;
function srsUpdate(c,q){
  const now=Date.now();const iv=c.interval||60000;const ef=c.ef||2.5;
  let ni,ne;
  if(q==="easy"){ne=Math.min(ef+.15,3);ni=Math.min(iv*ne,7*864e5)}
  else{ne=Math.max(ef-.3,1.3);ni=Math.max(iv*.4,3e4)}
  return{...c,interval:ni,ef:ne,nextReview:now+ni,lastReview:now,reviews:(c.reviews||0)+1};
}

function feedback(t){
  const r=[
    {p:/\bjeg vil gerne\b/i,m:'"Jeg vil gerne" — perfekt!',g:1},
    {p:/\bkan du\b/i,m:'"Kan du..." — fin form!',g:1},

// REVISED STT HOOK (Continuous & Resilient)
// ══════════════════════════════════════════════
function useSTT(){
  const[on,setOn]=useState(false);const[tr,setTr]=useState("");const[ok,setOk]=useState(false);const[reason,setReason]=useState("");
  const ref=useRef(null);const permRef=useRef(false);const onRef=useRef(false);

  useEffect(()=>{onRef.current=on},[on]);

  useEffect(()=>{
    const isSecure=window.isSecureContext||location.protocol==="https:"||location.hostname==="localhost"||location.hostname==="127.0.0.1";
    if(!isSecure){setReason("https");return}
    const SR=window.SpeechRecognition||window.webkitSpeechRecognition;if(!SR){setReason("unsupported");return}
    setOk(true);
    
    const r=new SR();
    r.lang="da-DK";
    r.interimResults=true;
    r.continuous=true; // Added to hint browsers to stay open
    
    r.onresult=e=>{
      let t="";
      for(let i=0;i<e.results.length;i++){
        t+=e.results[i][0].transcript;
      }
      setTr(t);
    };
    
    r.onend=()=>{
      // Will fire gracefully when Android cuts it off after a pause
      onRef.current=false;
      setOn(false);
    };
    
    r.onerror=(e)=>{
      console.warn("STT error:",e.error);
      // Avoid immediately closing on silence
      if(e.error!=="no-speech"){
        onRef.current=false;
        setOn(false);
      }
      if(e.error==="not-allowed")setReason("denied");
    };
    
    ref.current=r;
  },[]);

  const ensurePermission=async()=>{
    if(permRef.current)return true;
    try{
      const stream=await navigator.mediaDevices.getUserMedia({audio:true});
      stream.getTracks().forEach(t=>t.stop());
      permRef.current=true;
      return true;
    }catch(e){
      console.warn("Mic permission denied:",e);
      setReason("denied");
      return false;
    }
  };

  const start=useCallback(async()=>{
    if(!ref.current||onRef.current)return;
    const allowed=await ensurePermission();
    if(!allowed)return;
    setTr(""); // Clear previous burst's transcript
    try{
      ref.current.start();
      onRef.current=true;
      setOn(true);
    }catch(e){console.warn("STT start error:",e)}
  },[]);

  const stop=useCallback(()=>{
    if(!ref.current)return;
    try{ref.current.stop()}catch(e){console.warn("STT stop error:",e)}
    onRef.current=false;
    setOn(false);
  },[]);

  return{on,tr,ok,reason,start,stop};
}

function useTTSPlayer(apiKey){
  const[playing,setPlaying]=useState(null);const audioRef=useRef(null);
  const play=useCallback(async(text,id,style)=>{
    if(audioRef.current){audioRef.current.pause();audioRef.current=null}
    setPlaying(id);
    const url=await geminiTTS(text,apiKey,style||"Speak clearly in natural Danish at a moderate pace");
    if(url){
      const a=new Audio(url);audioRef.current=a;
      a.onended=()=>{setPlaying(null);URL.revokeObjectURL(url)};
      a.onerror=()=>{setPlaying(null);browserTTS(text)};
      a.play().catch(()=>{setPlaying(null);browserTTS(text)});
    }else{browserTTS(text);setTimeout(()=>setPlaying(null),2000)}
  },[apiKey]);
  const stopAudio=useCallback(()=
