function fetchWithTimeout(url,opts,timeoutMs=60000){
  return Promise.race([
    fetch(url,opts),
    new Promise((_,rej)=>setTimeout(()=>rej(new Error("Timeout efter "+(timeoutMs/1000)+"s")),timeoutMs))
  ]);
}

const TTS_MODELS=["gemini-2.5-flash-preview-tts","gemini-2.5-pro-preview-tts"];
function pcmToWav(b64){
  const raw=atob(b64),buf=new ArrayBuffer(raw.length),v=new Uint8Array(buf);
  for(let i=0;i<raw.length;i++)v[i]=raw.charCodeAt(i);
  const sr=24000,nc=1,bps=16,len=buf.byteLength,wavBuf=new ArrayBuffer(44+len),w=new DataView(wavBuf);
  const ws=(o,s)=>{for(let i=0;i<s.length;i++)w.setUint8(o+i,s.charCodeAt(i))};
  ws(0,"RIFF");w.setUint32(4,36+len,true);ws(8,"WAVE");ws(12,"fmt ");
  w.setUint32(16,16,true);w.setUint16(20,1,true);w.setUint16(22,nc,true);w.setUint32(24,sr,true);
  w.setUint32(28,sr*nc*(bps/8),true);w.setUint16(32,nc*(bps/8),true);w.setUint16(34,bps,true);
  ws(36,"data");w.setUint32(40,len,true);new Uint8Array(wavBuf,44).set(new Uint8Array(buf));
  return URL.createObjectURL(new Blob([wavBuf],{type:"audio/wav"}));
}
async function geminiTTS(text,apiKey,style){
  if(!apiKey)return null;
  const body={contents:[{role:"user",parts:[{text:(style?style+": ":"")+`"${text}"`}]}],generationConfig:{responseModalities:["AUDIO"],speechConfig:{voiceConfig:{prebuiltVoiceConfig:{voiceName:"Kore"}}}}};
  for(const model of TTS_MODELS){
    try{
      const url=`https://generativelanguage.googleapis.com/v1beta/models/${model}:generateContent?key=${apiKey}`;
      const r=await fetchWithTimeout(url,{method:"POST",headers:{"Content-Type":"application/json"},body:JSON.stringify(body)},10000);
      const d=await r.json(),b64=d?.candidates?.[0]?.content?.parts?.[0]?.inlineData?.data;
      if(d.error||!b64)continue;
      return pcmToWav(b64);
    }catch{continue}
  }
  return null;
}
function browserTTS(text){
  const s=window.speechSynthesis;if(!s)return;s.cancel();
  const u=new SpeechSynthesisUtterance(text),dk=s.getVoices().find(v=>v.lang&&v.lang.startsWith("da"));
  if(dk)u.voice=dk;u.lang="da-DK";u.rate=0.88;s.speak(u);
}

const GEMINI_MODELS=["gemini-2.0-flash","gemini-2.0-flash-lite","gemini-3-flash","gemini-2.5-flash-lite"];
async function geminiAnalyze(content,apiKey,isImage=false,mimeType="image/jpeg",onStatus){
  if(!apiKey)return{error:"Ingen API-nøgle. Gå til Indstillinger."};
  const prompt=`You are analyzing Danish learning material. Extract:
1. "vocab": array of {"da":"Danish word/phrase","en":"English translation","cat":"category"}
2. "grammar": array of short grammar point strings found
3. "scenario": {"title":"short Danish title","titleEn":"English title","setup":"Danish scenario description using extracted vocab","setupEn":"English translation","role":"AI character role in English","vocab":["da_word|en_word",...]}

Return ONLY valid JSON, no markdown, no backticks. Max 15 vocab items. Make the scenario practical and conversational.`;
  const parts=isImage?[{text:prompt},{inlineData:{mimeType:mimeType,data:content}}]:[{text:prompt+"\n\nMATERIAL:\n"+content}];
  const errors=[];
  for(let i=0;i<GEMINI_MODELS.length;i++){
    const model=GEMINI_MODELS[i];
    if(onStatus)onStatus("Prøver "+model+" ("+(i+1)+"/"+GEMINI_MODELS.length+")...");
    const url=`https://generativelanguage.googleapis.com/v1beta/models/${model}:generateContent?key=${apiKey}`;
    try{
      const r=await fetchWithTimeout(url,{method:"POST",headers:{"Content-Type":"application/json"},body:JSON.stringify({contents:[{role:"user",parts}],generationConfig:{temperature:0.2}})});
      const d=await r.json();
      if(d.error){const msg=d.error.message||JSON.stringify(d.error);errors.push(model+": "+msg.slice(0,100));continue}
      let txt=d?.candidates?.[0]?.content?.parts?.[0]?.text||"";
      if(!txt){errors.push(model+": tomt svar");continue}
      txt=txt.replace(/```json|```/g,"").trim();
      try{return JSON.parse(txt)}catch{errors.push(model+": JSON parse fejl");continue}
    }catch(e){errors.push(model+": "+e.message);continue}
  }
  return{error:"Alle modeller fejlede:\n"+errors.join("\n"),retryable:errors.every(e=>e.includes("quota")||e.includes("rate")||e.includes("exceeded")||e.includes("429")||e.includes("RESOURCE_EXHAUSTED"))};
}
async function readFileAsBase64(file){
  return new Promise((resolve,reject)=>{
    const reader=new FileReader();
    reader.onload=()=>resolve(reader.result.split(",")[1]);
    reader.onerror=()=>reject(new Error("Kunne ikke læse filen"));
    reader.readAsDataURL(file);
  });
}

function srsUpdate(c,q){
  const now=Date.now(),iv=c.interval||60000,ef=c.ef||2.5;let ni,ne;
  if(q==="easy"){ne=Math.min(ef+.15,3);ni=Math.min(iv*ne,7*864e5)}

}
function feedback(t){

}

function useSTT(){
  const[on,setOn]=useState(false),[tr,setTr]=useState(""),[ok,setOk]=useState(false),[reason,setReason]=useState("");
  const recRef=useRef(null),silenceRef=useRef(null),finalRef=useRef("");
  const clearSilence=useCallback(()=>{if(silenceRef.current){clearTimeout(silenceRef.current);silenceRef.current=null}},[]);
  const stopRecognition=useCallback(()=>{clearSilence();try{recRef.current?.stop()}catch{}},[clearSilence]);
  useEffect(()=>{
    const isSecure=window.isSecureContext||location.protocol==="https:"||location.hostname==="localhost"||location.hostname==="127.0.0.1";
    if(!isSecure){setReason("https");return}
    const SR=window.SpeechRecognition||window.webkitSpeechRecognition;
    if(!SR){setReason("unsupported");return}
    const r=new SR();
    r.lang="da-DK";r.interimResults=true;r.continuous=false;r.maxAlternatives=1;
    r.onstart=()=>{finalRef.current="";setOn(true);setTr("");setReason("")};
    r.onresult=e=>{
      let interim="",finalText=finalRef.current;
      for(let i=e.resultIndex;i<e.results.length;i++){
        const part=(e.results[i][0]?.transcript||"").trim();
        if(!part)continue;
        if(e.results[i].isFinal)finalText=(finalText?finalText+" ":"")+part;
        else interim=(interim?interim+" ":"")+part;
      }
      finalRef.current=finalText;
      setTr((finalText||interim)?[finalText,interim].filter(Boolean).join(" ").trim():"");
      clearSilence();
      silenceRef.current=setTimeout(()=>{setReason(prev=>prev||"silence");stopRecognition()},2200);
      if(finalText)stopRecognition();
    };
    r.onspeechend=()=>{stopRecognition()};
    r.onerror=e=>{
      clearSilence();setOn(false);
      const map={"not-allowed":"denied","service-not-allowed":"denied","no-speech":"no-speech","audio-capture":"audio-capture","network":"network","aborted":"aborted"};
      setReason(map[e.error]||e.error||"error");
    };
    r.onend=()=>{clearSilence();setOn(false);const text=(finalRef.current||"").trim();if(text)setTr(text)};
    recRef.current=r;setOk(true);
    return()=>{clearSilence();try{r.stop()}catch{}};
  },[clearSilence,stopRecognition]);
  const start=useCallback(()=>{
    if(!recRef.current||on)return;
    finalRef.current="";setTr("");setReason("");clearSilence();
    try{recRef.current.start()}catch(e){console.warn("STT start error:",e)}
  },[clearSilence,on]);
  const stop=useCallback(()=>{stopRecognition();setOn(false)},[stopRecognition]);
  return{on,tr,ok,reason,start,stop};
}

function useTTSPlayer(apiKey){
  const[playing,setPlaying]=useState(null),audioRef=useRef(null);
  const play=useCallback(async(text,id,style)=>{
    if(audioRef.current){audioRef.current.pause();audioRef.current=null}
    setPlaying(id);
    const url=await geminiTTS(text,apiKey,style||"Speak clearly in natural Danish at a moderate pace");
    if(url){
      const a=new Audio(url);audioRef.current=a;
      a.onended=()=>{setPlaying(null);URL.revokeObjectURL(url)};
      a.onerror=()=>{setPlaying(null);browserTTS(text)};
      a.play().catch(()=>{setPlaying(null);browserTTS(text)});
    }else{browserTTS(text);setTimeout(()=>setPlaying(null),2000)}
  },[apiKey]);
  const stopAudio=useCallback(()=>{if(audioRef.current){audioRef.current.pause();audioRef.current=null}setPlaying(null);window.speechSynthesis?.cancel()},[]);
  return{playing,play,stop:stopAudio};
}
